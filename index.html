<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Quán 6.1 - Tinh Hoa Chuyển Đổi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');
        body { background-color: #faf6f0; color: #2e2620; font-family: 'Quicksand', sans-serif; }
        .product-card { transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .admin-panel { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header Cổ Phong -->
    <header class="max-w-2xl mx-auto text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">Thư Quán Tri Thức</h1>
        <p class="text-gray-600 italic">"Đầu tư vào bản thân là khoản đầu tư lãi nhất"</p>
        
        <!-- Voucher Section -->
        <div class="mt-6 p-4 bg-red-50 border-2 border-red-200 rounded-lg border-dashed">
            <h3 class="font-bold text-red-800">🎁 VOUCHER ĐỘC QUYỀN</h3>
            <p class="text-sm">Nhập mã: <span class="font-bold text-lg text-red-600">THUQUAN10</span> - Giảm 10%</p>
        </div>
    </header>

    <!-- Product Grid: Đưa sản phẩm lên đầu tiên -->
    <main id="product-grid" class="max-w-2xl mx-auto grid grid-cols-2 gap-4">
        <!-- JS sẽ inject sản phẩm vào đây -->
    </main>

    <!-- Admin Panel (Bí mật) -->
    <div id="admin-panel" class="admin-panel max-w-2xl mx-auto mt-12 p-6 bg-white rounded-lg shadow-md border">
        <h2 class="text-xl font-bold mb-4">📊 Dashboard Kiểm Soát Chuyển Đổi</h2>
        <div id="stats-container" class="text-sm space-y-2"></div>
        <button onclick="resetStats()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded">Reset Lượt Click</button>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-12 py-8 border-t">
        <p onclick="toggleAdmin()" class="cursor-pointer text-gray-400 text-sm hover:text-gray-600">© Thư Quán 6.1 - Tinh hoa đọc sách</p>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRSDNjSvjxfstsjznBpzU-Z0xkbQICuaDCYWgIAS1qKD7C7uVQAJaRrJTKcpyoDwreQgp_ffx-ogvc/pub?output=csv";
        let products = [];
        let stats = JSON.parse(localStorage.getItem('product_clicks')) || {};

        async function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: (results) => {
                    products = results.data.filter(item => item.title);
                    render();
                }
            });
        }

        function trackClick(id) {
            stats[id] = (stats[id] || 0) + 1;
            localStorage.setItem('product_clicks', JSON.stringify(stats));
            render();
        }

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            // Sắp xếp tự động sản phẩm hot lên đầu
            products.sort((a, b) => (stats[b.id] || 0) - (stats[a.id] || 0));

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white p-3 rounded-xl shadow-md border';
                card.innerHTML = `
                    <img src="${p.image}" class="w-full h-40 object-cover rounded-lg mb-2" onerror="this.src='https://placehold.co/200x200?text=Book'">
                    <h3 class="font-bold text-sm h-10 overflow-hidden mb-2">${p.title}</h3>
                    <div class="text-xs text-red-600 font-semibold mb-2">Đã có ${stats[p.id] || 0} lượt bấm</div>
                    <a href="${p.shopeeLink}" onclick="trackClick('${p.id}')" target="_blank" 
                       class="block text-center bg-red-600 text-white py-2 rounded-lg text-sm font-bold shadow-lg hover:bg-red-700">MUA NGAY</a>
                `;
                grid.appendChild(card);
            });
        }

        function toggleAdmin() {
            document.getElementById('admin-panel').style.display = 'block';
            const container = document.getElementById('stats-container');
            container.innerHTML = products.map(p => `<p class="border-b py-1">${p.title}: <b class="text-red-600">${stats[p.id] || 0} click</b></p>`).join('');
        }

        function resetStats() {
            localStorage.removeItem('product_clicks');
            stats = {};
            render();
            alert("Đã reset dữ liệu!");
        }

        init();
    </script>
</body>
</html>
