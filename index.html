<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Quán - Chọn Lọc Tri Thức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --main-bg: #f8f7f3; --text-color: #2e2620; --accent: #3b5a4a; }
        body { background: #e5e5e5; font-family: 'Quicksand', sans-serif; color: var(--text-color); margin: 0; }
        .phone-container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; background: var(--main-bg); padding: 20px; }
        
        /* Banner & Profile rút gọn */
        .header-section { text-align: center; margin-bottom: 20px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--accent); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; }
        
        /* Grid hiển thị sản phẩm tối ưu */
        .books-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { background: white; border-radius: 16px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .product-img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; background: #eee; }
        .product-title { font-size: 13px; font-weight: 700; margin: 8px 0; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .btn-buy { display: block; width: 100%; background: var(--accent); color: white; text-align: center; padding: 8px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-section">
        <div class="avatar">📚</div>
        <h2 id="name">Góc Đầu Tư Tri Thức</h2>
    </div>

    <!-- Nơi hiển thị kho sách -->
    <div class="books-grid" id="grid"></div>
</div>

<script>
    const CONFIG = { csv: "https://docs.google.com/spreadsheets/d/1OEkxVs6mbxmGj6hh6OVKmVxImkFpUn1UCXmlqYhJ920/export?format=csv" };

    function render(data) {
        const grid = document.getElementById('grid');
        grid.innerHTML = data.map(item => `
            <div class="product-card" onclick="window.open('${item.shopeeLink}', '_blank')">
                <img src="${item.image}" class="product-img" onerror="this.src='https://placehold.co/200x200?text=Sách'">
                <div class="product-title">${item.title}</div>
                <div class="btn-buy">Mua ngay</div>
            </div>
        `).join('');
    }

    Papa.parse(CONFIG.csv, {
        download: true, header: true, complete: (results) => render(results.data)
    });
</script>
</body>
</html>
